version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ocean-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ocean
      POSTGRES_PASSWORD: oceanpass
      POSTGRES_DB: ocean_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ocean -d ocean_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ocean-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: oceanminio
      MINIO_ROOT_PASSWORD: oceanminio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  createbucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 oceanminio oceanminio123;
      /usr/bin/mc mb myminio/ocean-cases || true;
      /usr/bin/mc anonymous set none myminio/ocean-cases || true;
      exit 0;
      "

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ocean-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://ocean:oceanpass@postgres:5432/ocean_db
      JWT_SECRET: change-me-in-production-very-long-random-string
      PORT: 4000
      NODE_ENV: development
      STORAGE_TYPE: s3
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ocean-cases
      S3_ACCESS_KEY: oceanminio
      S3_SECRET_KEY: oceanminio123
      S3_REGION: us-east-1
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: sh -c "npx prisma migrate dev --name init && npm run dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ocean-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:4000
    command: npm run dev -- --host

volumes:
  pgdata:
  miniodata:
