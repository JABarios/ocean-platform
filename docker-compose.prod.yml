services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: ocean-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      DATABASE_URL: file:/app/data/prod.db
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET no está definido}
      KEY_CUSTODY_SECRET: ${KEY_CUSTODY_SECRET:?KEY_CUSTODY_SECRET no está definido}
      PORT: 4000
      NODE_ENV: production
      STORAGE_TYPE: filesystem
      UPLOAD_DIR: /app/uploads/cases
      GALLERY_IMPORT_ROOT: /app/gallery-imports
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      APP_ORIGIN: ${APP_ORIGIN:-https://app.ocean-eeg.org}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-OCEAN EEG <ocean@ndg.report>}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@ocean-eeg.org}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads/cases
      - ./backend/gallery-imports:/app/gallery-imports
